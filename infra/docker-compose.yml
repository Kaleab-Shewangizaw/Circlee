version: "3.9"

services:
  nginx:
    image: nginx:1.29-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - realtime

  api:
    image: rust:1.94
    working_dir: /app/backend
    command: cargo run -p circlee-api
    volumes:
      - ../backend:/app/backend
    environment:
      RUST_LOG: info
    depends_on:
      - postgres
      - redis

  realtime:
    image: rust:1.94
    working_dir: /app/backend
    command: cargo run -p circlee-realtime
    volumes:
      - ../backend:/app/backend
    environment:
      RUST_LOG: info
    depends_on:
      - redis

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: circlee
      POSTGRES_USER: circlee
      POSTGRES_PASSWORD: circlee
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:

